<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rastreamento Motoboy - Dimensões Burguer</title>

  <style>
    :root {
      --bg: #07110b;
      --card: #111827;
      --card2: #0f172a;
      --border: #263244;
      --green: #22c55e;
      --green-dark: #15803d;
      --red: #b91c1c;
      --text: #f9fafb;
      --muted: #d1d5db;
      --purple: #7e22ce;
      --yellow: #facc15;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(34, 197, 94, 0.15), transparent 35%),
        radial-gradient(circle at bottom, rgba(126, 34, 206, 0.16), transparent 35%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: rgba(17, 24, 39, 0.96);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 24px;
      box-shadow: 0 0 36px rgba(34, 197, 94, 0.18);
      text-align: center;
    }

    .logo {
      width: 74px;
      height: 74px;
      margin: 0 auto 12px;
      border-radius: 50%;
      border: 3px solid var(--green);
      box-shadow: 0 0 24px rgba(34, 197, 94, 0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle, #22c55e 0%, #052e16 65%, #111827 100%);
      font-size: 32px;
    }

    h1 {
      color: var(--green);
      font-size: 25px;
      margin: 0 0 8px;
      letter-spacing: 0.5px;
    }

    p {
      color: var(--muted);
      line-height: 1.45;
      margin: 8px 0 16px;
      font-size: 15px;
    }

    label {
      display: block;
      text-align: left;
      font-weight: bold;
      font-size: 14px;
      color: var(--muted);
      margin: 14px 0 6px;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--card2);
      color: white;
      font-size: 16px;
      outline: none;
    }

    input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.18);
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 14px;
      padding: 15px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 12px;
      color: white;
      transition: transform 0.08s ease, opacity 0.2s ease;
    }

    button:active {
      transform: scale(0.98);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .iniciar {
      background: linear-gradient(135deg, var(--green-dark), var(--green));
    }

    .parar {
      background: linear-gradient(135deg, #7f1d1d, var(--red));
    }

    .teste {
      background: linear-gradient(135deg, #334155, #475569);
    }

    .status {
      margin-top: 18px;
      padding: 14px;
      border-radius: 14px;
      background: var(--card2);
      color: var(--muted);
      font-size: 14px;
      min-height: 78px;
      text-align: left;
      border: 1px solid var(--border);
      line-height: 1.45;
      word-break: break-word;
    }

    .ok {
      color: #86efac;
      border-color: rgba(34, 197, 94, 0.45);
    }

    .erro {
      color: #fca5a5;
      border-color: rgba(248, 113, 113, 0.45);
    }

    .aviso {
      color: #fde68a;
      border-color: rgba(253, 230, 138, 0.35);
    }

    .info {
      margin-top: 12px;
      padding: 12px;
      background: rgba(34, 197, 94, 0.08);
      border: 1px solid rgba(34, 197, 94, 0.22);
      border-radius: 14px;
      text-align: left;
      color: #d1d5db;
      font-size: 13px;
      line-height: 1.45;
    }

    .rodape {
      margin-top: 14px;
      font-size: 12px;
      color: #9ca3af;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo">🛵</div>
    <h1>Dimensões Burguer</h1>
    <p>Rastreamento do motoboy em tempo real durante as entregas.</p>

    <div id="avisoHttps" class="info">
      Verificando se o navegador permite localização...
    </div>

    <label for="nomeMotoboy">Nome do motoboy</label>
    <input id="nomeMotoboy" placeholder="Ex: João" autocomplete="name">

    <button id="btnTeste" class="teste" onclick="testarPermissao()">TESTAR PERMISSÃO DE LOCALIZAÇÃO</button>
    <button id="btnIniciar" class="iniciar" onclick="iniciarRastreamento()">INICIAR RASTREAMENTO</button>
    <button id="btnParar" class="parar" onclick="pararRastreamento()">PARAR RASTREAMENTO</button>

    <div id="status" class="status aviso">
      Aguardando iniciar...
    </div>

    <div class="rodape">
      Use apenas durante o expediente/entregas e com autorização do motoboy.
    </div>
  </div>

  <script>
    const FIREBASE_URL = "https://dimensoesburguer-85c0f-default-rtdb.firebaseio.com";

    let watchId = null;
    let nomeAtual = "";
    let ultimoEnvio = 0;

    function limparNome(nome) {
      return nome
        .trim()
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9]/g, "_")
        .replace(/_+/g, "_")
        .replace(/^_|_$/g, "");
    }

    function setStatus(msg, tipo = "") {
      const status = document.getElementById("status");
      status.className = "status " + tipo;
      status.innerHTML = msg;
    }

    function atualizarBotoes(rastreando) {
      document.getElementById("btnIniciar").disabled = rastreando;
      document.getElementById("btnParar").disabled = !rastreando;
      document.getElementById("nomeMotoboy").disabled = rastreando;
    }

    function mostrarDiagnosticoInicial() {
      const aviso = document.getElementById("avisoHttps");
      const protocolo = window.location.protocol;
      const host = window.location.hostname;
      const href = window.location.href;

      const seguro =
        window.isSecureContext ||
        protocolo === "https:" ||
        host === "localhost" ||
        host === "127.0.0.1";

      if (!("geolocation" in navigator)) {
        aviso.innerHTML = "❌ Este navegador não tem suporte a localização.";
        aviso.style.borderColor = "rgba(248, 113, 113, 0.45)";
        return false;
      }

      if (!seguro) {
        aviso.innerHTML =
          "⚠️ <b>O navegador NÃO vai liberar localização nesse endereço.</b><br><br>" +
          "Você abriu como: <br><b>" + href + "</b><br><br>" +
          "Para aparecer a opção de permitir localização, envie este arquivo para um site com <b>HTTPS</b>, como Firebase Hosting ou Vercel.<br><br>" +
          "Abrir direto da pasta Downloads geralmente aparece como <b>file://</b> e não libera localização.";
        aviso.style.borderColor = "rgba(253, 230, 138, 0.5)";
        return false;
      }

      aviso.innerHTML =
        "✅ Endereço seguro detectado. A permissão de localização deve aparecer ao clicar em <b>TESTAR</b> ou <b>INICIAR RASTREAMENTO</b>.";
      aviso.style.borderColor = "rgba(34, 197, 94, 0.45)";
      return true;
    }

    async function verificarPermissaoAPI() {
      if (!navigator.permissions || !navigator.permissions.query) {
        return "indisponivel";
      }

      try {
        const result = await navigator.permissions.query({ name: "geolocation" });
        return result.state; // granted, denied ou prompt
      } catch (e) {
        return "indisponivel";
      }
    }

    async function testarPermissao() {
      const seguro = mostrarDiagnosticoInicial();
      const estado = await verificarPermissaoAPI();

      if (!seguro) {
        setStatus(
          "⚠️ O problema é o endereço onde o arquivo foi aberto. Precisa estar em HTTPS para o celular mostrar a opção de permitir localização.",
          "aviso"
        );
        return;
      }

      if (estado === "denied") {
        setStatus(
          "❌ A localização está bloqueada para este site/navegador.<br><br>" +
          "No Android/Chrome: toque no cadeado ao lado do endereço do site > Permissões > Localização > Permitir.<br><br>" +
          "Também confira se a localização do celular está ligada.",
          "erro"
        );
        return;
      }

      setStatus("Solicitando localização de teste...", "aviso");

      navigator.geolocation.getCurrentPosition(
        pos => {
          setStatus(
            "✅ Permissão funcionando.<br>" +
            "<b>Latitude:</b> " + pos.coords.latitude.toFixed(6) + "<br>" +
            "<b>Longitude:</b> " + pos.coords.longitude.toFixed(6) + "<br>" +
            "<b>Precisão:</b> " + Math.round(pos.coords.accuracy) + "m<br><br>" +
            "Agora pode clicar em <b>INICIAR RASTREAMENTO</b>.",
            "ok"
          );
        },
        erroLocalizacao,
        {
          enableHighAccuracy: true,
          maximumAge: 0,
          timeout: 15000
        }
      );
    }

    async function enviarLocalizacao(position) {
      const agora = Date.now();

      // Evita spam excessivo no Firebase. Envia no máximo a cada 5 segundos.
      if (agora - ultimoEnvio < 5000) {
        return;
      }
      ultimoEnvio = agora;

      const lat = position.coords.latitude;
      const lng = position.coords.longitude;
      const precisao = position.coords.accuracy;

      const dados = {
        nome: nomeAtual,
        lat: lat,
        lng: lng,
        precisao: precisao,
        ativo: true,
        ultima_atualizacao: agora
      };

      const id = limparNome(nomeAtual);

      try {
        await fetch(`${FIREBASE_URL}/motoboys/${id}.json`, {
          method: "PATCH",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(dados)
        });

        setStatus(
          `✅ Localização enviada com sucesso<br>
           <b>Motoboy:</b> ${nomeAtual}<br>
           <b>Latitude:</b> ${lat.toFixed(6)}<br>
           <b>Longitude:</b> ${lng.toFixed(6)}<br>
           <b>Precisão:</b> ${Math.round(precisao)}m<br>
           <b>Horário:</b> ${new Date().toLocaleTimeString("pt-BR")}`,
          "ok"
        );
      } catch (e) {
        setStatus("❌ Erro ao enviar para o Firebase:<br>" + e.message, "erro");
      }
    }

    function erroLocalizacao(error) {
      let msg = "Erro ao pegar localização.";

      if (error.code === 1) {
        msg =
          "Permissão de localização negada ou bloqueada.<br><br>" +
          "Faça assim no Android/Chrome:<br>" +
          "1. Toque no cadeado ao lado do endereço do site.<br>" +
          "2. Entre em Permissões.<br>" +
          "3. Em Localização, marque Permitir.<br>" +
          "4. Recarregue a página.<br><br>" +
          "Se não aparecer o cadeado/permissão, provavelmente o arquivo não está em HTTPS.";
      }

      if (error.code === 2) {
        msg =
          "Localização indisponível.<br><br>" +
          "Confira se a localização/GPS do celular está ligada.";
      }

      if (error.code === 3) {
        msg =
          "Tempo esgotado ao tentar localizar.<br><br>" +
          "Tente sair para uma área com melhor sinal de GPS/internet e clique novamente.";
      }

      setStatus("❌ " + msg, "erro");
      atualizarBotoes(false);
    }

    async function iniciarRastreamento() {
      const seguro = mostrarDiagnosticoInicial();

      if (!seguro) {
        setStatus(
          "⚠️ Não dá para iniciar enquanto o arquivo não estiver em HTTPS. Suba na Vercel ou Firebase Hosting e abra o link gerado.",
          "aviso"
        );
        return;
      }

      const estado = await verificarPermissaoAPI();

      if (estado === "denied") {
        setStatus(
          "❌ Localização já está bloqueada para este site/navegador. Libere nas permissões do site e recarregue a página.",
          "erro"
        );
        return;
      }

      const nomeDigitado = document.getElementById("nomeMotoboy").value.trim();

      if (!nomeDigitado) {
        setStatus("Digite o nome do motoboy primeiro.", "erro");
        return;
      }

      nomeAtual = nomeDigitado;

      if (!navigator.geolocation) {
        setStatus("Este celular/navegador não suporta localização.", "erro");
        return;
      }

      setStatus("Solicitando permissão de localização...", "aviso");
      atualizarBotoes(true);

      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
      }

      watchId = navigator.geolocation.watchPosition(
        enviarLocalizacao,
        erroLocalizacao,
        {
          enableHighAccuracy: true,
          maximumAge: 0,
          timeout: 15000
        }
      );
    }

    async function pararRastreamento() {
      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }

      const nomeDigitado = document.getElementById("nomeMotoboy").value.trim();
      const nomeBase = nomeDigitado || nomeAtual;
      const id = limparNome(nomeBase);

      if (id) {
        try {
          await fetch(`${FIREBASE_URL}/motoboys/${id}.json`, {
            method: "PATCH",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              ativo: false,
              ultima_atualizacao: Date.now()
            })
          });
        } catch (e) {
          setStatus("Rastreamento parado no celular, mas houve erro ao atualizar offline no Firebase.", "erro");
          atualizarBotoes(false);
          return;
        }
      }

      setStatus("🛑 Rastreamento parado.", "aviso");
      atualizarBotoes(false);
    }

    window.addEventListener("beforeunload", () => {
      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
      }
    });

    mostrarDiagnosticoInicial();
    atualizarBotoes(false);
  </script>

</body>
</html>
